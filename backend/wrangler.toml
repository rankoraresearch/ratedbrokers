name = "ratedbrokers-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

routes = [
  { pattern = "api.ratedbrokers.com/*", zone_name = "ratedbrokers.com" }
]

[vars]
FRONTEND_URL = "https://ratedbrokers.com"
# API_KEY is set via `wrangler secret put API_KEY` in production.
# For local dev, set it here or via .dev.vars file:
# API_KEY = "dev-test-key"

# Cron Trigger — auto-publish scheduled pages every hour
[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "ratedbrokers"
database_id = "0583b2f5-4bba-4d05-868a-1228a109668e"
