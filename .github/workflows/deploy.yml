name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run brokers:build
      - run: npm run build
        env:
          VITE_API_URL: https://ratedbrokers-api.ratedbrokers.workers.dev
      - uses: cloudflare/wrangler-action@v3
        with:
          command: pages deploy dist --project-name=ratedbrokers
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
